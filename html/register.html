<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MundiChat - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/register.css">
</head>

<body>
    <header>
        <nav class="navbar">

            <div class="wrapper-logo">
                <h1 id="titulo">MundiChat</h1>
            </div>

            <!-- Título de la página -->
            <div class="wrapper-opc">

                <a id="subtitulo" href="/Html/index.html">INICIO</a>
            </div>

            <!-- Botón ingresar -->
            <div class="wrapper-btn">
                <a href="/Html/login.html" class="btn-login">REGRESAR</a>
            </div>


        </nav>
    </header>


    <div class="wrapperReg">

        <div class="bodyReg">

            <div class="perfilReg">
                <img class="imgReg" src="/Image/perfil.png" alt="">
             

            </div>


            <div class="gridReg">
                <div class="flexReg">
                    <h1 class="tReg">Registro</h1>
                </div>

                <div class="flexReg">
                    <label class="lReg">Correo electronico</label>

                    <label class="lReg" for="">nickname</label>

                </div>

                <div class="flexReg">
                    <input class="iReg" type="text">
                    <input class="iReg" type="text">
                </div>

                <div class="flexReg">
                    <label class="lReg">Nombre completo</label>


                    <label class="lReg" for="">Fecha de nacimiento</label>

                </div>

                <div class="flexReg">
                    <input class="iReg" type="text">
                    <input class="iReg" type="date">
                </div>

                <div class="flexReg">
                    <label class="lReg">Contraseña</label>

                </div>

                <div class="flexReg">
                    <input class="iReg" type="password">

                     <div class="iReg">
                        <button class="btn-reg"><a href="/Html/profile.html">Registro</a></button>
                    </div>
                </div>


                <div class="flexReg">
                
                    <div class="wrapperImg">
                          <button class="img-upload">Foto</button>
                    </div>
                  
                
                </div>
            </div>


        </div>


    </div>

   
</body>

</html>
